<html>
    <head>
        <title>Perfil do Funcionário</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <main>
            <table> 
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>Departamento</th>
                    <th>E-mail</th>
                    <th>Contratacao</th>
                    <th>Acões</th>
                </tr>
                <tr th:each="funcionario : ${lerIds}">
                    <td th:text="${funcionario.id}"></td>
                    <td th:text="${funcionario.nome}"></td>
                    <td th:text="${funcionario.cargo}"></td>
                    <td th:text="${funcionario.departamento}"></td>
                    <td th:text="${funcionario.email}"></td>
                    <td th:text="${funcionario.dataContratacao}"></td>
                    <td>
                        <a th:href="@{/perfil(id=${funcionario.id})}">Editar</a>
                    </td>
                </tr>
            </table>
        </main>>
    </body>
</html>
